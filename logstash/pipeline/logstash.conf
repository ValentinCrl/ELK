input {
  file {
    path => "/var/log/apps/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    mode => "tail"
    codec => json
  }

  file {
    path => "/var/log/analysed/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    mode => "read"
  }

  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  mutate {
    add_field => {
      "source_file" => "%{[log][file][path]}"
    }
  }

  grok {
    match => {
      "source_file" => ".*/(?<source_filename>[^/]+)$"
    }
    tag_on_failure => []
  }

  if [source_filename] {
    mutate {
      copy => { "source_filename" => "service_file" }
      gsub => [
        "service_file", "_service\.log$", "",
        "service_file", "_", " "
      ]
    }
  }

  if [message] {
    mutate {
      gsub => [
        "message", "\u001B\[[0-9;]*[A-Za-z]", "",
        "message", "\r", ""
      ]
      strip => ["message"]
    }
  }

  grok {
    match => {
      "message" => [
        "^%{TIMESTAMP_ISO8601:log_timestamp} - %{LOGLEVEL:level} - \[%{DATA:service}\] - %{GREEDYDATA:log_detail}$",
        "^%{IPORHOST:client_ip} - - \[%{HTTPDATE:access_timestamp}\] \"%{WORD:http_method} %{DATA:url_path} HTTP/%{NUMBER:http_version}\" %{INT:status_code:int} -$"
      ]
    }
    tag_on_failure => []
  }

  if ![service] and [service_file] {
    mutate {
      add_field => { "service" => "%{service_file}" }
    }
  }

  if [log_timestamp] {
    date {
      match => ["log_timestamp", "YYYY-MM-dd HH:mm:ss,SSS"]
      target => "@timestamp"
    }
  }

  if [log_detail] =~ /^Added user:/ {
    grok {
      match => {
        "log_detail" => "^Added user: \{'id': '%{DATA:user_id}', 'name': '%{DATA:user_name}'\}$"
      }
      tag_on_failure => []
    }
    mutate {
      add_field => { "event_type" => "user_created" }
    }
  } else if [log_detail] =~ /^Added order:/ {
    grok {
      match => {
        "log_detail" => "^Added order: \{'id': %{INT:order_id:int}, 'user_id': '%{DATA:user_id}', 'product': '%{DATA:product_name}'\}$"
      }
      tag_on_failure => []
    }
    mutate {
      add_field => { "event_type" => "order_created" }
    }
  } else if [log_detail] =~ /^GET request for/ {
    grok {
      match => {
        "log_detail" => "^%{WORD:http_method} request for %{GREEDYDATA:resource_name}$"
      }
      tag_on_failure => []
    }
    mutate {
      add_field => { "event_type" => "business_request" }
    }
  } else if [log_detail] =~ /HTTP\/[0-9.]+/ {
    grok {
      match => {
        "log_detail" => "^%{IPORHOST:client_ip} - - \[%{DATA:access_timestamp}\] \"%{WORD:http_method} %{DATA:url_path} HTTP/%{NUMBER:http_version}\" %{INT:status_code:int} -$"
      }
      tag_on_failure => []
    }
    mutate {
      add_field => { "event_type" => "http_access" }
    }
  } else if [log_detail] =~ /^WARNING:/ {
    mutate {
      add_field => { "event_type" => "startup_warning" }
    }
  } else if [log_detail] =~ /^Press CTRL\+C to quit$/ {
    mutate {
      add_field => { "event_type" => "startup_info" }
    }
  }

  if ![event_type] and [message] =~ /^\* Running on / {
    mutate {
      add_field => { "event_type" => "startup_info" }
    }
  }

  if ![service] and [service_file] {
    mutate {
      add_field => { "service" => "%{service_file}" }
    }
  }

  if [status_code] {
    mutate {
      convert => { "status_code" => "integer" }
    }
  }

  if [service] {
    mutate {
      lowercase => ["service"]
      gsub => ["service", "\s+", "_"]
    }
  }

  if ![event_type] and [message] =~ /SUCCESS \([0-9]{3} OK\)/ {
    mutate {
      add_field => { "event_type" => "client_success" }
    }
  } else if ![event_type] and [message] =~ /SERVER ERROR \([0-9]{3}\)/ {
    mutate {
      add_field => { "event_type" => "client_server_error" }
    }
  } else if ![event_type] and [message] =~ /CLIENT ERROR \([0-9]{3}\)/ {
    mutate {
      add_field => { "event_type" => "client_error" }
    }
  } else if ![event_type] and [message] =~ /^TIMEOUT:/ {
    mutate {
      add_field => { "event_type" => "client_timeout" }
    }
  } else if ![event_type] and [message] =~ /^CONNECTION FAILED:/ {
    mutate {
      add_field => { "event_type" => "client_connection_failed" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "elk-demo-%{+YYYY.MM.dd}"
    data_stream => false
  }

  stdout {
    codec => rubydebug
  }
}
